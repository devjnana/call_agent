
<VirtualHost *:80>
ServerName voice1.saasgold.in
ServerAdmin    webmaster@saasgold.in
ErrorLog     /var/log/apache2/voice1.saasgold.in.error.log
CustomLog    /var/log/apache2/voice1.saasgold.in.access.log combined
LogLevel error

#Redirect permanent / https://live-realcrm.jierp.in/
RewriteEngine On
RewriteCond %{REQUEST_URI} !^/\.well\-known/acme\-challenge/
RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>


<VirtualHost *:443>
ServerName voice1.saasgold.in
ServerAdmin    webmaster@saasgold.in
DocumentRoot /var/www/html/voice1.saasgold.in/
ErrorLog     /var/log/apache2/voice1.saasgold.in.error.log
CustomLog    /var/log/apache2/voice1.saasgold.in.access.log combined
LogLevel error

SSLEngine on
SSLCertificateFile /etc/letsencrypt/live/voice1.saasgold.in/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/voice1.saasgold.in/privkey.pem
Include /etc/letsencrypt/options-ssl-apache.conf


Protocols h2 http/1.1
Header always set Strict-Transport-Security "max-age=63072000"

ProxyRequests Off
ProxyPreserveHost On

# Plivo bidirectional audio — Node listens for WebSocket upgrades on /ws/plivo (must match WS_BASE_URL path).
# More specific ProxyPass must appear before the catch-all / proxy.
ProxyPass        /ws/plivo  ws://127.0.0.1:7001/ws/plivo  upgrade=websocket  timeout=600  keepalive=on
ProxyPassReverse /ws/plivo  ws://127.0.0.1:7001/ws/plivo

ProxyPass        /  http://127.0.0.1:7001/  timeout=600  keepalive=on
ProxyPassReverse /  http://127.0.0.1:7001/

ProxyTimeout 600

<Location />
  Order allow,deny
  Allow from all
</Location>
</VirtualHost>
